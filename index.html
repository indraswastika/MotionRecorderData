<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CURL Online Tool</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        input, textarea, select {
            width: 100%;
            margin-bottom: 10px;
            padding: 10px;
            font-size: 16px;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <h1>CURL Online Tool</h1>
    <form id="curlForm">
        <label for="endpoint">Endpoint URL:</label>
        <input type="text" id="endpoint" name="endpoint" required>

        <label for="method">HTTP Method:</label>
        <select id="method" name="method">
            <option value="GET">GET</option>
            <option value="POST">POST</option>
            <option value="PUT">PUT</option>
            <option value="DELETE">DELETE</option>
        </select>

        <label for="headers">Headers (JSON format):</label>
        <textarea id="headers" name="headers" rows="4" placeholder='{"Content-Type": "application/json"}'></textarea>

        <label for="params">Parameters (JSON format):</label>
        <textarea id="params" name="params" rows="4" placeholder='{"key": "value"}'></textarea>

        <button type="button" onclick="sendRequest()">Send Request</button>
    </form>

    <h2>Response</h2>
    <pre id="response"></pre>

    <script>
        function sendRequest() {
            const endpoint = document.getElementById('endpoint').value;
            const method = document.getElementById('method').value;
            const headers = JSON.parse(document.getElementById('headers').value || '{}');
            const params = JSON.parse(document.getElementById('params').value || '{}');

            const options = {
                method: method,
                headers: headers,
            };

            if (method !== 'GET') {
                options.body = JSON.stringify(params);
            }

            fetch(endpoint, options)
                .then(response => response.json())
                .then(data => {
                    document.getElementById('response').textContent = JSON.stringify(data, null, 2);
                })
                .catch(error => {
                    document.getElementById('response').textContent = 'Error: ' + error;
                });
        }
    </script>
</body>
</html>
